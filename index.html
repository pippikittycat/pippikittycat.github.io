<!-- Script for moving .content-box around cursor. -->
<script>
  const container = document.querySelector(".container");

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let currentX = mouseX, currentY = mouseY;

  function animate() {
    // Smooth easing towards mouse.
    currentX += (mouseX - currentX) * 0.05;
    currentY += (mouseY - currentY) * 0.05;

    // Map mouse to a very small translation range (-4px to +4px).
    const moveX = (currentX / window.innerWidth - 0.5) * 8;
    const moveY = (currentY / window.innerHeight - 0.5) * 8;

    container.style.transform = `translate(${moveX}px, ${moveY}px)`;

    requestAnimationFrame(animate);
  }

  window.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Reset .content-box gently to center when mouse leaves window.
  window.addEventListener("mouseleave", () => {
    mouseX = window.innerWidth / 2;
    mouseY = window.innerHeight / 2;
  });

  animate();
</script>
</body>
