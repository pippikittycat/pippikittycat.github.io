<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Studio of Brittney Farris</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Nunito Sans', sans-serif;
      background: #fdfaf5 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      background-size: 300px;
      color: #3a2c27;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative elements */
    .decor {
      position: absolute;
      opacity: 0.25;
      z-index: -1;
    }

    .rainbow {
      top: 1rem;
      right: 1rem;
      width: 180px;
    }

    .circle {
      bottom: 2rem;
      left: 2rem;
      width: 120px;
    }

    .coffee {
      bottom: 4rem;
      right: 3rem;
      width: 150px;
      transform: rotate(-10deg);
    }

    header {
      margin-top: 4rem;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #d6bfa7;
    }

    .title small {
      display: block;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
      color: #7b6d63;
    }

    .title h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin: 0.2rem 0;
      color: #3a2c27;
    }

    .subtitle {
      font-size: 1rem;
      color: #5e514a;
      font-weight: 500;
    }

    /* Grid Buttons */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      padding: 2rem;
      max-width: 850px;
      margin: 3rem auto;
    }

    .button-grid a {
      text-decoration: none;
      padding: 1rem 1.5rem;
      background: #d6bfa7;
      color: #3a2c27;
      font-weight: 600;
      border-radius: 999px;
      transition: all 0.2s ease;
      font-size: 1.1rem;
      font-family: 'Nunito Sans', sans-serif;
      display: inline-block;
    }

    .button-grid a:hover {
      background: #c2a88f;
      transform: scale(1.05);
    }

    footer {
      margin-top: auto;
      padding: 1rem;
      font-size: 0.9rem;
      color: #6e5e56;
    }

    .email-button {
      display: inline-block;
      background: #b35c2e;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .email-button:hover {
      background: #964924;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Decorative Images -->
  <img src="https://i.imgur.com/9pQ8h1D.png" alt="decorative rainbow" class="decor rainbow">
  <img src="https://i.imgur.com/R6VQlQp.png" alt="decorative circle" class="decor circle">
  <img src="https://i.imgur.com/qF0DQjF.png" alt="coffee stain" class="decor coffee">

  <header>
    <div class="profile">
      <img src="https://via.placeholder.com/90" alt="Profile Photo">
      <div class="title">
        <small>The Studio of</small>
        <h1>Brittney Farris</h1>
        <div class="subtitle">Developer • Maker • Creator</div>
      </div>
    </div>
  </header>

  <main>
    <div class="button-grid">
      <a href="#">Blogs</a>
      <a href="#">Resume</a>
      <a href="#">Employment History</a>
      <a href="#">Projects / Portfolio</a>
      <a href="#">What I'm Working on Now</a>
      <a href="#">Social Media</a>
    </div>
  </main>

  <footer>
    <p>© 2025 Brittney Farris</p>
    <a class="email-button" href="mailto:junk.stable342@passinbox.com">Email Me!</a>
  </footer>
</body>
</html>
