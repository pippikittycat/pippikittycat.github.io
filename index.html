<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Studio of Jane Doe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Raleway', sans-serif;
      background: #f9f6f1 url("images/hub_background_pic.png") no-repeat center center fixed;
      background-size: cover;
      color: #333;
      overflow-x: hidden;
    }

    /* Floating dots container */
    .floating-dots {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .floating-dots span {
      position: absolute;
      display: block;
      width: 6px;
      height: 6px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      animation: floatDots 8s linear infinite;
      opacity: 0;
    }

    /* Example random placements */
    .floating-dots span:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
    .floating-dots span:nth-child(2) { top: 60%; left: 30%; animation-delay: 2s; }
    .floating-dots span:nth-child(3) { top: 40%; left: 70%; animation-delay: 4s; }
    .floating-dots span:nth-child(4) { top: 80%; left: 50%; animation-delay: 1s; }
    .floating-dots span:nth-child(5) { top: 10%; left: 80%; animation-delay: 3s; }
    .floating-dots span:nth-child(6) { top: 25%; left: 60%; animation-delay: 5s; }
    .floating-dots span:nth-child(7) { top: 70%; left: 20%; animation-delay: 6s; }
    .floating-dots span:nth-child(8) { top: 90%; left: 75%; animation-delay: 7s; }
    .floating-dots span:nth-child(9) { top: 55%; left: 10%; animation-delay: 4.5s; }
    .floating-dots span:nth-child(10){ top: 35%; left: 90%; animation-delay: 2.5s; }

    @keyframes floatDots {
      0%   { transform: translateY(0) scale(0.8); opacity: 0; }
      20%  { opacity: 0.5; }
      50%  { transform: translateY(-20px) scale(1); opacity: 0.8; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(-40px) scale(0.8); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2; /* Above floating dots */
      text-align: center;
      padding: 60px 20px;
    }

    .profile-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .profile-header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #c8a27e;
      object-fit: cover;
    }

    .profile-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 0;
    }

    .profile-header h1 span {
      display: block;
      font-size: 3rem;
      font-weight: 600;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: 0 auto 40px;
    }

    .button-grid a {
      display: block;
      padding: 15px;
      font-size: 1.2rem;
      font-family: 'Raleway', sans-serif;
      text-decoration: none;
      background: #f0e4d7;
      color: #333;
      border-radius: 12px;
      box-shadow: 2px 4px 6px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .button-grid a:hover {
      background: #e6d5c3;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #555;
    }

    footer a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      background: #c8a27e;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    footer a:hover {
      background: #a67c52;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Floating dots animation -->
  <div class="floating-dots">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="profile-header">
      <img src="profile.jpg" alt="Profile photo placeholder">
      <h1>The Studio of <span>Brittney Farris</span></h1>
    </div>

    <div class="button-grid">
      <a href="#">Portfolio</a>
      <a href="#">Blog</a>
      <a href="#">What I'm Working On</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <footer>
    <p>© 2025 Jane Doe</p>
    <a href="mailto:junk.stable342@passinbox.com">Email Me!</a>
  </footer>
</body>
</html>
